<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor Proyect 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/general.css">
  <link rel="stylesheet" href="css/background.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/clip-path.css">
  <link rel="stylesheet" href="css/mobile-device.css">
</head>
<body>
  <img src="images/bg-desktop.png" alt="figma" class="clip-path__image">
  
  <div class="first-row__clip-path">
          <p class="clip-path__text clip-path__margin-bottom"><strong>185</strong></p>
          <p class="clip-path__margin-bottom ">GB LEFT</p>
  </div>

  <main class="main__container">
    <section class="files__main main">
      <img src="images/logo.svg" alt="logo" class="files__image">
      
      <div class="files__options">
        <div class="files__fondo">
          <img src="images/icon-document.svg" alt="f1le" class="files__icons">
        </div>
        <div class="files__fondo">
          <img src="images/icon-folder.svg" alt="f1le" class="files__icons">
        </div>
        <div class="files__fondo">
          <img src="images/icon-upload.svg" alt="f1le" class="files__icons">
        </div>
      </div>
    </section>
    
    <section class="loading__main main">
      <section class="loading__first-row">
        <p class="loading__paragraph paragraph">You've used <strong>815 GB</strong> of your storage</p>
      </section>

      <section class="loading__bar">
        <div class="bar__color">
          <div class="bar__button"></div>
        </div>
      </section>

      <section class="loading__third-row">
        <p class="loading__paragraph paragraph"><strong>0 GB</strong></p>
        <p class="loading__paragraph paragraph"><strong>1000 GB</strong></p>
      </section>
    </section>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" class="attribution__paragraph">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/PabloOchoa-maker" class="attribution__paragraph">Pablo Ochoa-maker</a>.
  </footer>
</body>
</html>
